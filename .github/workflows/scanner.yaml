name: SonarQube Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sonar-analysis:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

    - name: Run Snyk Code
      run: snyk test --json > snyk-code-report.json 
      continue-on-error: true
  
    - name: Generate GitHub Summary (Table)
      run: |
        echo "## Snyk Code Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Severity | Issue Title | Description | File |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------------|-------------|------|" >> $GITHUB_STEP_SUMMARY
        if jq -e '.issues | length > 0' snyk-code-report.json > /dev/null; then
          jq -r '.issues[] | "| \(.severity) | \(.title) | \(.message // "N/A") | \(.path // "N/A") |"' snyk-code-report.json >> $GITHUB_STEP_SUMMARY
        else
          echo "| None | No issues found | N/A | N/A |" >> $GITHUB_STEP_SUMMARY
        fi


     

