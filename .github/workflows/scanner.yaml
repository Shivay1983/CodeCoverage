name: Full Security & Quality Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build project
        run: mvn -B clean compile

      # -------------------------------
      # 🔍 Trivy Vulnerability Scan
      # -------------------------------
      - name: Run Trivy FS Scan
        run: trivy fs --scanners vuln --format json -o trivy-report.json .

      - name: Generate Trivy Summary
        run: |
          echo "## 🔍 Trivy Vulnerability Report" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Severity | Vulnerability |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|---------------|" >> $GITHUB_STEP_SUMMARY
          cat trivy-report.json | jq -r '.Results[].Vulnerabilities[]? | "| \(.PkgName) | \(.Severity) | \(.VulnerabilityID) |"' >> $GITHUB_STEP_SUMMARY

      # -------------------------------
      # 🔑 Gitleaks Secret Scan
      # -------------------------------
      - name: Download Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64 -o gitleaks
          chmod +x gitleaks

      - name: Run Gitleaks scan
        run: |
          ./gitleaks detect --source . \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 0

      - name: Generate Gitleaks Summary
        run: |
          echo "## 🔑 Gitleaks Report Summary" >> $GITHUB_STEP_SUMMARY
          total=$(jq 'length' gitleaks-report.json)
