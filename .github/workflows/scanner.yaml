name: SonarQube Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sonar-analysis:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run Trivy FS Scan
      run: trivy fs --scanners vuln --format json -o trivy-report.json .
          
    - name: Generate Trivy Summary
      run: |
        echo "## Trivy Vulnerability Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Target | Severity | Vulnerability |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|----------|---------------|" >> $GITHUB_STEP_SUMMARY
        cat trivy-report.json | jq -r '.Results[].Vulnerabilities[]? | "| \(.PkgName) | \(.Severity) | \(.VulnerabilityID) |"' >> $GITHUB_STEP_SUMMARY
